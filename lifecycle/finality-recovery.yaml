id: prysm-lifecycle-finality-recovery
name: "Prysm lifecycle shard - finality recovery"
description: |
  Mirrors the lifecycle test's recovery phase: exit 150 validators, then wait
  for finality to recover.
version: 1.0.0
tags: [prysm, lifecycle, finality, recovery, voluntary-exit, assertoor]
timeout: 20h

config:
  validatorMnemonic: "trial jeans seat abstract runway cupboard please elevator club file arrow lounge crash sun thumb clock duty priority key fence funny trick diary album"
  recoveryExitIndexCount: 150
  maxUnfinalizedEpochs: 4

tasks:
  - name: check_clients_are_healthy
    title: "Check if at least one client is ready"
    timeout: 5m
    config:
      minClientCount: 1

  - name: run_task_options
    title: "Exit validators so finality can recover"
    config:
      task:
        name: generate_exits
        title: "Exit recovery validators"
        configVars:
          mnemonic: "validatorMnemonic"
          indexCount: "recoveryExitIndexCount"

  - name: check_consensus_finality
    title: "Wait for consensus chain finality"
    timeout: 18h
    configVars:
      maxUnfinalizedEpochs: "maxUnfinalizedEpochs"
