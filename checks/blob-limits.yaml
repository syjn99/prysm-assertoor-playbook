# Example Assertoor playbook for migrating Prysm's BlobLimitsRespected evaluator.
#
# Native Assertoor can drive blobs (generate_blob_transactions) and assert a
# MINIMUM blob count (check_consensus_block_proposals minBlobCount), but has no
# max-blob / BPO-schedule / utilization assertion. So the limit logic is done in
# run_javascript -- the same custom task used in the metrics/fee-recipient examples.
#
# Replicates blob_limits.go for the previous epoch (post-Fulu):
#   1. no block exceeds MaxBlobsPerBlock for the epoch (BPO schedule)
#   2. on a BPO transition epoch, at least one block exceeds the OLD limit
#   3. when the epoch limit > Electra's max, capacity utilization is >= 50%
#
# The per-epoch limit comes from /eth/v1/config/spec BLOB_SCHEDULE -- the same
# data the evaluator reads via MaxBlobsPerBlockAtEpoch. Checks 2 and 3 depend on
# generating enough blobs, so blobs are driven in the background.
#
# Tune `minEpochNumber` to land on/after the BPO epoch you want to exercise; if
# the previous epoch is pre-Fulu the script passes as a no-op (matching the
# evaluator's policy).

id: blob-limits-check
name: "Blob BPO limits respected"
timeout: 30m

config:
  beaconUrl: "http://prysm-bn-0:3500"
  walletPrivkey: ""
  # Wait until the previous epoch is the BPO/Fulu epoch you want to test.
  minEpochNumber: 3
  minUtilizationPercent: 50

tasks:
  - name: check_clients_are_healthy
    title: "Wait for a healthy client"
    timeout: 5m
    config:
      minClientCount: 1

  - name: run_task_background
    title: "Drive blobs, then verify limits"
    config:
      onBackgroundComplete: fail
      backgroundTask:
        name: generate_blob_transactions
        title: "Generate blob transactions"
        configVars:
          privateKey: "walletPrivkey"
        config:
          childWallets: 50
          limitPending: 10
          limitPerBlock: 5
          limitTotal: 0
          blobSidecars: 6
          randomTarget: true
      foregroundTask:
        name: run_tasks
        title: "Wait an epoch, then check blob limits"
        config:
          tasks:
            - name: check_consensus_slot_range
              title: "Wait for the target epoch"
              timeout: 20m
              configVars:
                minEpochNumber: "minEpochNumber"

            - name: run_javascript
              title: "Verify BPO blob limits respected in previous epoch"
              timeout: 5m
              config:
                envVars:
                  BEACON_URL: "beaconUrl"
                  MIN_UTIL: "minUtilizationPercent"
                script: |
                  const beacon = env.BEACON_URL.replace(/\/$/, "");
                  const minUtil = Number(env.MIN_UTIL);

                  const spec = (await getJSON(`${beacon}/eth/v1/config/spec`)).data;
                  const slotsPerEpoch = Number(spec.SLOTS_PER_EPOCH);
                  const fuluEpoch = Number(spec.FULU_FORK_EPOCH ?? Number.MAX_SAFE_INTEGER);
                  const electraMax = Number(spec.MAX_BLOBS_PER_BLOCK_ELECTRA ?? 9);
                  const schedule = (spec.BLOB_SCHEDULE || [])
                    .map((e) => ({ epoch: Number(e.EPOCH), max: Number(e.MAX_BLOBS_PER_BLOCK) }))
                    .sort((a, b) => a.epoch - b.epoch);

                  const head = await getJSON(`${beacon}/eth/v1/beacon/headers/head`);
                  const headEpoch = Math.floor(Number(head.data.header.message.slot) / slotsPerEpoch);
                  const epoch = headEpoch > 0 ? headEpoch - 1 : 0;

                  if (epoch < fuluEpoch) {
                    setOutputJSON("blobStats", { skipped: true, epoch, fuluEpoch });
                    return; // pre-Fulu: BPO not active, nothing to assert
                  }

                  const maxForEpoch = maxBlobsAtEpoch(epoch);
                  const prevMax = epoch > 0 ? maxBlobsAtEpoch(epoch - 1) : 0;
                  if (maxForEpoch <= 0) throw new Error(`no BLOB_SCHEDULE entry for epoch ${epoch}`);

                  const start = epoch * slotsPerEpoch;
                  let blockCount = 0, totalBlobs = 0, maxInBlock = 0;
                  for (let slot = start; slot < start + slotsPerEpoch; slot++) {
                    const res = await fetch(`${beacon}/eth/v2/beacon/blocks/${slot}`);
                    if (res.status === 404) continue; // missed slot
                    if (!res.ok) throw new Error(`block ${slot}: HTTP ${res.status}`);
                    const body = (await res.json()).data.message.body;
                    const blobs = (body.blob_kzg_commitments || []).length;

                    if (blobs > maxForEpoch) {
                      throw new Error(`slot ${slot} (epoch ${epoch}) has ${blobs} blobs, exceeds max ${maxForEpoch}`);
                    }
                    blockCount++;
                    totalBlobs += blobs;
                    if (blobs > maxInBlock) maxInBlock = blobs;
                  }

                  if (blockCount === 0) throw new Error(`no blocks found in epoch ${epoch}`);

                  const utilization = Math.floor((maxInBlock * 100) / maxForEpoch);
                  setOutputJSON("blobStats", { epoch, maxForEpoch, prevMax, maxInBlock, totalBlobs, blockCount, utilization });

                  // BPO transition epoch: a block must exceed the previous limit.
                  if (maxForEpoch > prevMax && maxInBlock <= prevMax) {
                    throw new Error(`BPO transition epoch ${epoch}: limit ${prevMax}->${maxForEpoch} but max blobs in any block was ${maxInBlock} (BPO not exercised)`);
                  }

                  // Above Electra's cap: require meaningful utilization.
                  if (maxForEpoch > electraMax && utilization < minUtil) {
                    throw new Error(`epoch ${epoch}: only ${utilization}% blob utilization (max ${maxInBlock}/${maxForEpoch}), expected >= ${minUtil}%`);
                  }

                  function maxBlobsAtEpoch(e) {
                    let max = 0;
                    for (const entry of schedule) {
                      if (entry.epoch <= e) max = entry.max; // schedule is sorted ascending
                    }
                    return max;
                  }

                  async function getJSON(url) {
                    const r = await fetch(url);
                    if (!r.ok) throw new Error(`${url}: HTTP ${r.status}`);
                    return r.json();
                  }
